<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="ball">
      <circle cx="20" cy="20" r="11"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="40" height="40" rx="10" fill="#0f172a"/>

  <!-- White ball -->
  <circle cx="20" cy="20" r="11" fill="white"/>

  <!-- Football pattern clipped to ball -->
  <g clip-path="url(#ball)">
    <!-- Centre pentagon -->
    <polygon points="20,15.5 24.3,18.6 22.7,23.6 17.3,23.6 15.7,18.6" fill="#0f172a"/>
    <!-- Seam lines from each pentagon vertex to circle edge -->
    <line x1="20"   y1="15.5" x2="20"   y2="8"    stroke="#0f172a" stroke-width="1.3"/>
    <line x1="24.3" y1="18.6" x2="31"   y2="16.4"  stroke="#0f172a" stroke-width="1.3"/>
    <line x1="22.7" y1="23.6" x2="27"   y2="29.5"  stroke="#0f172a" stroke-width="1.3"/>
    <line x1="17.3" y1="23.6" x2="13"   y2="29.5"  stroke="#0f172a" stroke-width="1.3"/>
    <line x1="15.7" y1="18.6" x2="9"    y2="16.4"  stroke="#0f172a" stroke-width="1.3"/>
  </g>

  <!-- Ball outline -->
  <circle cx="20" cy="20" r="11" stroke="#0f172a" stroke-width="1" stroke-opacity="0.15"/>
</svg>
