<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="#0f172a"/>

  <!-- 5 petals — each a closed path: vertex → circle-edge → arc → next-edge → next-vertex → Z -->
  <!-- Pentagon r=5.5, ball r=13, centre (20,20), vertices at -90°/-18°/54°/126°/198° -->
  <path d="M 20,14.5    L 20,7          A 13,13 0 0,1 32.36,15.98  L 25.23,18.3  Z" fill="white" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 25.23,18.3  L 32.36,15.98  A 13,13 0 0,1 27.64,30.52  L 23.23,24.45 Z" fill="white" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 23.23,24.45 L 27.64,30.52  A 13,13 0 0,1 12.36,30.52  L 16.77,24.45 Z" fill="white" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 16.77,24.45 L 12.36,30.52  A 13,13 0 0,1 7.64,15.98   L 14.77,18.3  Z" fill="white" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 14.77,18.3  L 7.64,15.98   A 13,13 0 0,1 20,7         L 20,14.5     Z" fill="white" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Centre pentagon -->
  <path d="M 20,14.5 L 25.23,18.3 L 23.23,24.45 L 16.77,24.45 L 14.77,18.3 Z" fill="#0f172a"/>
</svg>
